  # ---- IAM extended v2: additional access control policies ----
  - name: soc2-aws-iam-extended-v2
    description: "SOC2 IAM extended v2 — admin access, support role, CloudTrail policy, console unused, privilege escalation, server certs, hardware MFA"
    enabled: true
    credentials:
      - aws-positive
    framework: soc2
    collectors:
      - provider: aws
        services: [iam]
    policies:
      include:
        - "soc2-cc5.1-no-admin-access-production"
        - "soc2-cc6.1-iam-cloudtrail-policy"
        - "soc2-cc6.1-iam-support-role"
        - "soc2-cc6.1-kms-wildcard-decrypt"
        - "soc2-cc6.1-root-hardware-mfa"
        - "soc2-cc6.3-iam-policy-attached-to-groups-roles"
        - "soc2-cc6.3-iam-privilege-escalation"
        - "soc2-cc6.3-iam-user-console-unused"
        - "soc2-cc6.7-iam-no-server-certificates"
    assertions:
      expected_policy_results:
        "soc2-cc5.1-no-admin-access-production": pass     # e2e users don't have admin access
        "soc2-cc6.1-iam-cloudtrail-policy": pass           # no full CloudTrail access policies
        "soc2-cc6.1-iam-support-role": fail                # no AWS Support role configured
        "soc2-cc6.1-kms-wildcard-decrypt": pass            # no wildcard KMS decrypt policies
        "soc2-cc6.1-root-hardware-mfa": pass               # root has hardware MFA
        "soc2-cc6.3-iam-policy-attached-to-groups-roles": pass  # policies attached to groups/roles
        "soc2-cc6.3-iam-privilege-escalation": pass        # no privilege escalation paths
        "soc2-cc6.3-iam-user-console-unused": pass         # console users are active
        "soc2-cc6.7-iam-no-server-certificates": pass      # no server certificates

