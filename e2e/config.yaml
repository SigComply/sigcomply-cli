  #   description: "SOC2 with GCP infra + GitLab code review evidence"
  #   enabled: false
  #   credentials:
  #     - gcp-project
  #     - gitlab-group
  #   framework: soc2
  #   storage: gcs-evidence

  # - name: iso27001-azure-github
  #   description: "ISO27001 with Azure infra + GitHub evidence"
  #   enabled: false
  #   credentials:
  #     - azure-subscription
  #     - github-org
  #   framework: iso27001
  #   storage: azure-blob-evidence
