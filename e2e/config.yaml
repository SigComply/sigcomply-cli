version: "2"

defaults:
  timeout: 300
  cleanup: true

# ---------------------------------------------------------------------------
# Credential profiles
#
# Each profile maps semantic field names to environment variable names.
# The test runner reads the env var, then sets the standard SDK env var
# (e.g. AWS_ACCESS_KEY_ID) so the collector picks up the right identity.
#
# Create multiple profiles per provider for positive/negative testing with
# different IAM permissions.
# ---------------------------------------------------------------------------
credentials:
  aws-positive:
    provider: aws
    description: "Full-access AWS credentials for positive E2E tests"
    env_vars:
      access_key_id: E2E_AWS_ACCESS_KEY_ID
      secret_access_key: E2E_AWS_SECRET_ACCESS_KEY
      region: E2E_AWS_REGION

  aws-negative:
    provider: aws
    description: "Minimal AWS credentials (STS only) for negative/graceful-degradation tests"
    env_vars:
      access_key_id: E2E_AWS_NEGATIVE_ACCESS_KEY_ID
      secret_access_key: E2E_AWS_NEGATIVE_SECRET_ACCESS_KEY
      region: E2E_AWS_REGION

  # --- Future providers (uncomment when collectors are implemented) ---

  # github-org:
  #   provider: github
  #   description: "GitHub org token for repo/user evidence collection"
  #   env_vars:
  #     token: E2E_GITHUB_TOKEN
  #     org: E2E_GITHUB_ORG

  # gitlab-group:
  #   provider: gitlab
  #   description: "GitLab group token for project/user evidence collection"
  #   env_vars:
  #     token: E2E_GITLAB_TOKEN
  #     group: E2E_GITLAB_GROUP

  # gcp-project:
  #   provider: gcp
  #   description: "GCP service account for evidence collection"
  #   env_vars:
  #     credentials_file: E2E_GCP_CREDENTIALS
  #     project: E2E_GCP_PROJECT

  # azure-subscription:
  #   provider: azure
  #   description: "Azure service principal for evidence collection"
  #   env_vars:
  #     client_id: E2E_AZURE_CLIENT_ID
  #     client_secret: E2E_AZURE_CLIENT_SECRET
  #     tenant_id: E2E_AZURE_TENANT_ID
  #     subscription_id: E2E_AZURE_SUBSCRIPTION_ID

  # workday-tenant:
  #   provider: workday
  #   description: "Workday API credentials for HR evidence collection"
  #   env_vars:
  #     api_url: E2E_WORKDAY_API_URL
  #     client_id: E2E_WORKDAY_CLIENT_ID
  #     client_secret: E2E_WORKDAY_CLIENT_SECRET

# ---------------------------------------------------------------------------
# Storage profiles
#
# Sensitive values (bucket names) come from env vars.
# Static values (region) are inline.
# ---------------------------------------------------------------------------
storage_profiles:
  s3-evidence:
    backend: s3
    env_vars:
      bucket: E2E_S3_BUCKET
    config:
      region: us-east-1

  # gcs-evidence:
  #   backend: gcs
  #   env_vars:
  #     bucket: E2E_GCS_BUCKET
  #   config:
  #     project: my-gcp-project

  # azure-blob-evidence:
  #   backend: azure-blob
  #   env_vars:
  #     container: E2E_AZURE_CONTAINER
  #     account: E2E_AZURE_STORAGE_ACCOUNT

# ---------------------------------------------------------------------------
# Signing configuration
# ---------------------------------------------------------------------------
signing:
  env_vars:
    hmac_secret: E2E_HMAC_SECRET
  default_secret: "e2e-test-hmac-secret-default"

# ---------------------------------------------------------------------------
# Scenarios
#
# Each scenario references one or more credential profiles (multi-provider)
# and (optionally) a storage profile by name.  Scenarios whose credential
# env vars are missing are skipped, not failed — safe for local dev where
# you may only have one set of credentials.
#
# Optional fields:
#   collectors  - limit collection to specific providers/services
#   policies    - filter which policies are evaluated (include/exclude)
#
# Assertions:
#   collection_errors_expected  - true for negative/permission-denied tests
#   expected_policy_results     - assert specific pass/fail/skip per policy
#
# The pipeline phases (collect, evaluate, hash, sign) always run and are
# always verified. Storage phases only run when "storage" is set.
# ---------------------------------------------------------------------------
scenarios:
  # ---- Policy results with mixed console/programmatic users ----
  # Account has 4 IAM users:
  #   - sigcomply-e2e-positive:      programmatic-only (no login profile) — exempt from MFA
  #   - sigcomply-e2e-negative:      programmatic-only (no login profile) — exempt from MFA
  #   - sigcomply-e2e-console-mfa:   console user WITH MFA — passes
  #   - sigcomply-e2e-console-nomfa: console user WITHOUT MFA — triggers violation
  - name: soc2-aws-compliant
    description: "SOC2 check — validates programmatic-only exemption and console user MFA detection"
    enabled: true
    credentials:
      - aws-positive
    framework: soc2
    # No storage — this scenario only validates policy assertions, not S3 pipeline.
    # S3 storage is tested by soc2-aws-full scenario.
    assertions:
      expected_policy_results:
        "soc2-cc6.1-mfa": fail           # console-nomfa user triggers violation; programmatic-only users exempt
        "soc2-cc6.2-encryption": fail     # AES256 triggers low-severity warning (not KMS)

  # ---- Mixed policy results (real-world account) ----
  # Runs against the account as-is. Some policies may pass, some fail.
  # Verifies the full pipeline works regardless of compliance state.
  - name: soc2-aws-full
    description: "Full SOC2 compliance check against AWS with S3 evidence storage"
    enabled: true
    credentials:
      - aws-positive
    framework: soc2
    storage: s3-evidence
    # No expected_policy_results — any valid status (pass/fail/skip) is OK.
    # This scenario tests the pipeline, not the compliance state.

  # ---- Negative: permission denied (graceful degradation) ----
  - name: soc2-aws-negative
    description: "SOC2 with minimal AWS perms — verifies fail-safe collection pattern"
    enabled: true
    credentials:
      - aws-negative
    framework: soc2
    # No storage — negative user lacks S3 write access
    assertions:
      collection_errors_expected: true
      # All policies should skip (no evidence to evaluate)
      expected_policy_results:
        # --- IAM policies ---
        "soc2-cc6.1-mfa": skip
        "soc2-cc6.1-root-security": skip
        "soc2-cc6.1-password-policy": fail  # account-level password policy still readable
        # --- Encryption policies ---
        "soc2-cc6.2-encryption": skip
        "soc2-cc6.2-ebs-encryption": skip
        "soc2-cc6.2-rds-encryption": skip
        "soc2-cc6.2-s3-public-access": skip
        "soc2-cc6.1-kms-rotation": skip
        # --- Network policies ---
        "soc2-cc6.6-open-ports": skip
        "soc2-cc6.6-db-public": skip
        "soc2-cc6.6-flow-logs": skip
        # --- Transport encryption ---
        "soc2-cc6.7-s3-https": skip
        "soc2-cc6.7-db-ssl": skip
        # --- Container security ---
        "soc2-cc6.8-container-scanning": skip
        # --- Monitoring/detection ---
        "soc2-cc7.1-logging": skip
        "soc2-cc7.1-log-retention": skip
        "soc2-cc7.2-guardduty": fail       # empty detector list evaluates as "not enabled"
        "soc2-cc8.1-config-enabled": fail  # empty recorder list evaluates as "not recording"
        # --- Availability ---
        "soc2-a1.2-db-backup": skip
        "soc2-a1.2-storage-versioning": skip
        # --- Confidentiality ---
        "soc2-c1.1-encryption-coverage": skip
        # --- GCP-only (no GCP evidence collected) ---
        "soc2-cc6.1-key-rotation": skip
        "soc2-cc6.2-gcp-storage-encryption": skip
        "soc2-cc6.2-gcp-disk-encryption": skip
        "soc2-cc6.2-gcp-sql-encryption": skip
        "soc2-cc6.2-gcp-storage-public": skip
        "soc2-cc6.3-unused-credentials": skip
        "soc2-cc6.3-overly-permissive": skip
        # --- New AWS policies ---
        "soc2-cc6.2-cloudtrail-encryption": skip
        "soc2-a1.2-rds-multi-az": skip
        "soc2-cc6.1-access-key-rotation": skip
        "soc2-cc6.3-unused-credentials-aws": skip
        "soc2-cc6.3-overly-permissive-aws": skip
        # --- Phase 1-5 new policies ---
        "soc2-cc7.1-s3-access-logging": skip
        "soc2-a1.2-rds-deletion-protection": skip
        "soc2-cc6.1-ec2-imdsv2": skip
        "soc2-cc7.2-security-hub": fail         # fail-safe returns disabled
        "soc2-cc7.1-security-alarms": fail      # fail-safe returns no alarms
        "soc2-cc6.1-secrets-rotation": skip
        "soc2-cc6.8-lambda-security": skip
        "soc2-cc6.2-s3-account-public-access": fail  # fail-safe returns all-blocked=false
        "soc2-cc6.2-dynamodb-encryption": skip
        "soc2-a1.2-dynamodb-pitr": skip
        "soc2-cc6.8-ecs-security": skip
        "soc2-cc6.8-eks-security": skip
        "soc2-cc6.7-acm-expiry": skip
        "soc2-cc6.7-cloudfront-https": skip
        "soc2-cc6.7-elbv2-https": skip
        "soc2-cc6.6-waf-enabled": fail          # fail-safe returns count=0
        "soc2-c1.1-macie-enabled": fail         # fail-safe returns disabled
        "soc2-cc6.1-ssm-session-manager": fail  # fail-safe returns disabled
        # --- Phase 2 new policies (collectors without fail-safe evidence → skip) ---
        "soc2-cc6.1-multiple-active-keys": skip
        "soc2-cc5.1-iam-permission-boundary": skip
        "soc2-cc6.1-iam-user-groups": skip
        "soc2-cc6.3-inline-policies": skip
        "soc2-a1.2-rds-backup-retention": skip
        "soc2-a1.2-rds-auto-upgrade": skip
        "soc2-cc7.1-cloudtrail-cloudwatch": skip
        "soc2-cc7.2-cloudtrail-sns": skip
        "soc2-cc7.1-cloudtrail-log-bucket": skip
        "soc2-cc7.1-cloudtrail-log-validation": skip
        "soc2-cc6.8-lambda-vpc": skip
        "soc2-cc6.8-lambda-dlq": skip
        "soc2-c1.2-s3-lifecycle": skip
        "soc2-cc6.2-sns-encryption": skip
        "soc2-cc6.2-sqs-encryption": skip
        "soc2-cc6.6-default-vpc": skip
        "soc2-cc6.7-tls-minimum": skip
        # --- Phase 2 batched policies (CloudTrail batched → no evidence → skip) ---
        "soc2-cc7.1-cloudtrail-multi-region": skip
        "soc2-cc7.1-cloudtrail-data-events": skip
        # --- Phase 2 fail-safe collectors (create default evidence → fail) ---
        "soc2-cc3.2-inspector-enabled": fail       # fail-safe returns disabled
        "soc2-cc3.3-security-hub-standards": fail   # fail-safe returns disabled
        "soc2-cc4.1-config-multi-region": fail      # fail-safe returns not-recording
        "soc2-cc4.2-guardduty-multi-region": fail   # fail-safe returns disabled
        "soc2-cc7.2-guardduty-alerting": fail       # fail-safe returns no rule
        "soc2-cc9.3-backup-configured": fail        # fail-safe returns no plans
        "soc2-cc1.5-organizations-scps": pass       # fail-safe returns not-in-org, policy only fires when in org
        # --- Phase 4 new policies ---
        "soc2-cc6.6-opensearch-enforce-https": skip     # no OpenSearch domains
        "soc2-cc6.7-secrets-manager-rotation": skip     # no secrets
        "soc2-cc6.2-default-ebs-encryption": skip       # ec2 collector fails
        "soc2-cc6.6-lambda-public-access": skip         # no lambda functions
        "soc2-cc7.1-cloudtrail-s3-access-restricted": skip  # cloudtrail collector fails
        "soc2-cc7.1-rds-enhanced-monitoring": skip      # no RDS instances
        "soc2-a1.2-backup-cross-region": skip           # no backup plans
        "soc2-cc6.3-iam-access-analyzer": fail          # fail-safe returns disabled
        "soc2-cc6.1-iam-identity-center": fail          # fail-safe returns disabled
        "soc2-cc6.2-elasticache-encryption": skip       # no replication groups
        "soc2-cc6.6-elasticache-transit-encryption": skip  # no replication groups
        # --- GitHub-only (no GitHub evidence collected) ---
        "soc2-cc6.1-github-mfa": skip

  - name: iso27001-aws-full
    description: "Full ISO27001 compliance check against AWS with S3 evidence storage"
    enabled: true
    credentials:
      - aws-positive
    framework: iso27001
    storage: s3-evidence

  # ---- Selective: only IAM evidence, only MFA policy ----
  # Demonstrates per-scenario collector/policy filtering.
  # Collects only IAM evidence and evaluates only the MFA policy.
  - name: soc2-mfa-only
    description: "SOC2 MFA-only check — selective collector and policy filtering"
    enabled: true
    credentials:
      - aws-positive
    framework: soc2
    collectors:
      - provider: aws
        services: [iam]
    policies:
      include: ["soc2-cc6.1-mfa"]
    assertions:
      expected_policy_results:
        "soc2-cc6.1-mfa": fail              # console-nomfa user triggers violation

  # ---- IAM policies: MFA, root security, password policy ----
  - name: soc2-aws-iam-policies
    description: "SOC2 IAM policies — MFA, root account security, password policy"
    enabled: true
    credentials:
      - aws-positive
    framework: soc2
    collectors:
      - provider: aws
        services: [iam]
    policies:
      include:
        - "soc2-cc6.1-mfa"
        - "soc2-cc6.1-root-security"
        - "soc2-cc6.1-password-policy"
        - "soc2-cc6.1-access-key-rotation"
        - "soc2-cc6.3-unused-credentials-aws"
        - "soc2-cc6.3-overly-permissive-aws"
    assertions:
      expected_policy_results:
        "soc2-cc6.1-mfa": fail            # console-nomfa user triggers violation
        "soc2-cc6.1-root-security": pass   # root account has MFA and no access keys
        "soc2-cc6.1-password-policy": fail # default password policy is non-compliant
        "soc2-cc6.1-access-key-rotation": pass   # e2e user keys are <90 days old
        "soc2-cc6.3-unused-credentials-aws": pass # all credentials are actively used
        "soc2-cc6.3-overly-permissive-aws": pass  # no users with AdministratorAccess

  # ---- S3 policies: encryption, public access, HTTPS, versioning ----
  - name: soc2-aws-s3-policies
    description: "SOC2 S3 policies — encryption, public access, HTTPS enforcement, versioning"
    enabled: true
    credentials:
      - aws-positive
    framework: soc2
    collectors:
      - provider: aws
        services: [s3]
    policies:
      include:
        - "soc2-cc6.2-encryption"
        - "soc2-cc6.2-s3-public-access"
        - "soc2-cc6.7-s3-https"
        - "soc2-a1.2-storage-versioning"
        - "soc2-c1.1-encryption-coverage"
    assertions:
      expected_policy_results:
        "soc2-cc6.2-encryption": fail          # AES256 (not KMS) triggers warning
        "soc2-cc6.2-s3-public-access": pass    # public access block is configured on e2e buckets
        "soc2-cc6.7-s3-https": fail            # e2e bucket lacks HTTPS-only policy
        "soc2-a1.2-storage-versioning": fail   # e2e bucket lacks versioning
        "soc2-c1.1-encryption-coverage": pass  # e2e buckets have encryption configured

  # ---- Network/EC2 policies: security groups, VPC flow logs, EBS encryption ----
  - name: soc2-aws-network-policies
    description: "SOC2 network/EC2 policies — open ports, VPC flow logs, EBS encryption"
    enabled: true
    credentials:
      - aws-positive
    framework: soc2
    collectors:
      - provider: aws
        services: [ec2]
    policies:
      include:
        - "soc2-cc6.6-open-ports"
        - "soc2-cc6.6-flow-logs"
        - "soc2-cc6.2-ebs-encryption"
    assertions:
      expected_policy_results:
        "soc2-cc6.6-open-ports": pass       # no open security group rules
        "soc2-cc6.6-flow-logs": pass        # VPC flow logs enabled on default VPC
        "soc2-cc6.2-ebs-encryption": fail   # EBS default encryption not enabled

  # ---- RDS policies: encryption, public access, SSL, backups ----
  - name: soc2-aws-rds-policies
    description: "SOC2 RDS policies — encryption, public access, SSL enforcement, backups"
    enabled: true
    credentials:
      - aws-positive
    framework: soc2
    collectors:
      - provider: aws
        services: [rds]
    policies:
      include:
        - "soc2-cc6.2-rds-encryption"
        - "soc2-cc6.6-db-public"
        - "soc2-cc6.7-db-ssl"
        - "soc2-a1.2-db-backup"
        - "soc2-a1.2-rds-multi-az"
    assertions:
      expected_policy_results:
        "soc2-cc6.2-rds-encryption": fail  # storage encryption disabled
        "soc2-cc6.6-db-public": pass       # publicly accessible = false
        "soc2-cc6.7-db-ssl": fail          # SSL not enforced by default
        "soc2-a1.2-db-backup": fail        # backup retention = 0
        "soc2-a1.2-rds-multi-az": fail     # Multi-AZ not enabled on e2e instance

  # ---- Monitoring policies: GuardDuty, CloudTrail, CloudWatch, Config ----
  - name: soc2-aws-monitoring-policies
    description: "SOC2 monitoring/detection policies — GuardDuty, logging, log retention, Config"
    enabled: true
    credentials:
      - aws-positive
    framework: soc2
    collectors:
      - provider: aws
        services: [guardduty, cloudtrail, logs, config]
    policies:
      include:
        - "soc2-cc7.2-guardduty"
        - "soc2-cc7.1-logging"
        - "soc2-cc7.1-log-retention"
        - "soc2-cc8.1-config-enabled"
        - "soc2-cc6.2-cloudtrail-encryption"
    assertions:
      expected_policy_results:
        "soc2-cc7.2-guardduty": fail       # GuardDuty not enabled
        "soc2-cc7.1-logging": pass         # CloudTrail trail active, multi-region, log validation
        "soc2-cc7.1-log-retention": fail   # log group has no retention period set
        "soc2-cc8.1-config-enabled": fail  # AWS Config not recording
        "soc2-cc6.2-cloudtrail-encryption": pass  # CloudTrail trail has KMS encryption

  # ---- KMS + ECR policies ----
  - name: soc2-aws-kms-ecr-policies
    description: "SOC2 KMS rotation and ECR scanning policies"
    enabled: true
    credentials:
      - aws-positive
    framework: soc2
    collectors:
      - provider: aws
        services: [kms, ecr]
    policies:
      include:
        - "soc2-cc6.1-kms-rotation"
        - "soc2-cc6.8-container-scanning"
    assertions:
      expected_policy_results:
        "soc2-cc6.1-kms-rotation": fail       # rotation not enabled by default
        "soc2-cc6.8-container-scanning": fail  # scan on push disabled

  # ---- Serverless/data policies: Lambda, DynamoDB, Secrets Manager ----
  - name: soc2-aws-serverless-policies
    description: "SOC2 serverless/data policies — Lambda, DynamoDB, Secrets Manager"
    enabled: true
    credentials:
      - aws-positive
    framework: soc2
    collectors:
      - provider: aws
        services: [lambda, dynamodb, secretsmanager]
    policies:
      include:
        - "soc2-cc6.8-lambda-security"
        - "soc2-cc6.2-dynamodb-encryption"
        - "soc2-a1.2-dynamodb-pitr"
        - "soc2-cc6.1-secrets-rotation"
    assertions:
      expected_policy_results:
        "soc2-cc6.8-lambda-security": fail       # deprecated runtime (python3.8)
        "soc2-cc6.2-dynamodb-encryption": pass    # default encryption is SSE (still encrypted)
        "soc2-a1.2-dynamodb-pitr": fail           # PITR not enabled
        "soc2-cc6.1-secrets-rotation": fail       # rotation not configured

  # ---- Security services: SecurityHub, CloudWatch Alarms, Macie, WAF ----
  - name: soc2-aws-security-services
    description: "SOC2 security services — SecurityHub, CloudWatch Alarms, Macie, WAF"
    enabled: true
    credentials:
      - aws-positive
    framework: soc2
    collectors:
      - provider: aws
        services: [securityhub, cloudwatch, macie2, wafv2]
    policies:
      include:
        - "soc2-cc7.2-security-hub"
        - "soc2-cc7.1-security-alarms"
        - "soc2-c1.1-macie-enabled"
        - "soc2-cc6.6-waf-enabled"
    assertions:
      expected_policy_results:
        "soc2-cc7.2-security-hub": fail       # not enabled
        "soc2-cc7.1-security-alarms": fail    # no security alarms configured
        "soc2-c1.1-macie-enabled": fail       # not enabled
        "soc2-cc6.6-waf-enabled": fail        # no WAF ACLs

  # ---- Network/edge policies: ACM, CloudFront, S3 account access, IMDSv2, SSM ----
  - name: soc2-aws-network-edge-policies
    description: "SOC2 network/edge policies — ACM, CloudFront, S3 account access, IMDSv2, SSM"
    enabled: true
    credentials:
      - aws-positive
    framework: soc2
    collectors:
      - provider: aws
        services: [acm, cloudfront, s3control, ec2, ssm, elbv2]
    policies:
      include:
        - "soc2-cc6.7-acm-expiry"
        - "soc2-cc6.7-cloudfront-https"
        - "soc2-cc6.7-elbv2-https"
        - "soc2-cc6.2-s3-account-public-access"
        - "soc2-cc6.1-ec2-imdsv2"
        - "soc2-cc6.1-ssm-session-manager"
    assertions:
      expected_policy_results:
        "soc2-cc6.7-acm-expiry": skip              # no certificates
        "soc2-cc6.7-cloudfront-https": skip         # no distributions
        "soc2-cc6.7-elbv2-https": fail              # ALB has HTTP-only listener (no HTTPS)
        "soc2-cc6.2-s3-account-public-access": fail # account public access block not fully set
        "soc2-cc6.1-ec2-imdsv2": skip               # no EC2 instances provisioned
        "soc2-cc6.1-ssm-session-manager": fail      # SSM not configured

  # ---- ELBv2 policies: HTTPS enforcement ----
  - name: soc2-aws-elbv2-policies
    description: "SOC2 ELBv2 policies — HTTPS enforcement on load balancers"
    enabled: true
    credentials:
      - aws-positive
    framework: soc2
    collectors:
      - provider: aws
        services: [elbv2]
    policies:
      include:
        - "soc2-cc6.7-elbv2-https"
    assertions:
      expected_policy_results:
        "soc2-cc6.7-elbv2-https": fail    # HTTP-only listener (no HTTPS)

  # ---- Container policies: ECS, EKS (no clusters = skip) ----
  - name: soc2-aws-container-policies
    description: "SOC2 container policies — ECS, EKS (no clusters = skip)"
    enabled: true
    credentials:
      - aws-positive
    framework: soc2
    # No storage — zero evidence collected (no clusters provisioned)
    collectors:
      - provider: aws
        services: [ecs, eks]
    policies:
      include:
        - "soc2-cc6.8-ecs-security"
        - "soc2-cc6.8-eks-security"
    assertions:
      expected_policy_results:
        "soc2-cc6.8-ecs-security": skip    # no ECS clusters
        "soc2-cc6.8-eks-security": skip    # no EKS clusters

  # ---- RDS extended: deletion protection ----
  - name: soc2-aws-rds-extended
    description: "SOC2 RDS extended policies — deletion protection"
    enabled: true
    credentials:
      - aws-positive
    framework: soc2
    collectors:
      - provider: aws
        services: [rds]
    policies:
      include:
        - "soc2-a1.2-rds-deletion-protection"
    assertions:
      expected_policy_results:
        "soc2-a1.2-rds-deletion-protection": fail  # deletion protection not enabled on e2e instance

  # ---- S3 access logging ----
  - name: soc2-aws-s3-logging
    description: "SOC2 S3 access logging policy"
    enabled: true
    credentials:
      - aws-positive
    framework: soc2
    collectors:
      - provider: aws
        services: [s3]
    policies:
      include:
        - "soc2-cc7.1-s3-access-logging"
    assertions:
      expected_policy_results:
        "soc2-cc7.1-s3-access-logging": fail  # no access logging on e2e buckets

  # ---- IAM extended: permission boundary, user groups, inline policies, multiple keys ----
