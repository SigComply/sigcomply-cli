  #   description: "SOC2 full-stack: AWS + GitHub + Workday evidence"
  #   enabled: false
  #   credentials:
  #     - aws-positive
  #     - github-org
  #     - workday-tenant
  #   framework: soc2
  #   storage: s3-evidence

