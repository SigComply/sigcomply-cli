  - name: soc2-aws-secrets-extended
    description: "SOC2 Secrets Manager extended — CMK encryption, unused secrets"
    enabled: true
    credentials:
      - aws-positive
    framework: soc2
    collectors:
      - provider: aws
        services: [secretsmanager]
    policies:
      include:
        - "soc2-cc6.2-secrets-manager-cmk"
        - "soc2-cc6.3-unused-secrets"
    assertions:
      expected_policy_results:
        "soc2-cc6.2-secrets-manager-cmk": fail             # not using CMK
        "soc2-cc6.3-unused-secrets": pass                  # no unused secrets

  # ---- SNS extended: public access, delivery logging, KMS ----
  - name: soc2-aws-sns-extended
    description: "SOC2 SNS extended — public access, delivery logging, KMS encryption"
    enabled: true
    credentials:
      - aws-positive
    framework: soc2
    collectors:
      - provider: aws
        services: [sns]
    policies:
      include:
        - "soc2-cc6.6-sns-public-access"
        - "soc2-cc7.1-sns-delivery-logging"
        - "soc2-pi1.4-sns-kms-encryption"
    assertions:
      expected_policy_results:
        "soc2-cc6.6-sns-public-access": pass               # e2e topic is not publicly accessible
        "soc2-cc7.1-sns-delivery-logging": fail             # SNS topic has no delivery logging configured
        "soc2-pi1.4-sns-kms-encryption": pass               # SNS encryption check passes (policy checks attribute existence)

  # ---- SQS extended: DLQ, public access ----
  - name: soc2-aws-sqs-extended
    description: "SOC2 SQS extended — dead letter queue, public access"
    enabled: true
    credentials:
      - aws-positive
    framework: soc2
    collectors:
      - provider: aws
        services: [sqs]
    policies:
      include:
        - "soc2-a1.2-sqs-dlq"
        - "soc2-cc6.6-sqs-public-access"
    assertions:
      expected_policy_results:
        "soc2-a1.2-sqs-dlq": fail                         # no DLQ configured on e2e queue
        "soc2-cc6.6-sqs-public-access": pass               # e2e queue is not publicly accessible

  # ---- SSM extended: documents public, patching ----
  - name: soc2-aws-ssm-extended
    description: "SOC2 SSM extended — documents not public, compliant patching"
    enabled: true
    credentials:
      - aws-positive
    framework: soc2
    collectors:
      - provider: aws
        services: [ssm]
    policies:
      include:
        - "soc2-cc6.6-ssm-documents-not-public"
        - "soc2-cc6.8-ssm-compliant-patching"
    assertions:
      expected_policy_results:
        "soc2-cc6.6-ssm-documents-not-public": pass        # no public SSM documents
        "soc2-cc6.8-ssm-compliant-patching": skip          # no managed instances

  # ---- WAF extended: rule groups, logging ----
  - name: soc2-aws-waf-extended
    description: "SOC2 WAF extended — rule groups, logging"
    enabled: true
    credentials:
      - aws-positive
    framework: soc2
    collectors:
      - provider: aws
        services: [wafv2]
    policies:
      include:
        - "soc2-cc6.6-waf-rule-groups"
        - "soc2-cc7.1-waf-logging"
    assertions:
      expected_policy_results:
        "soc2-cc6.6-waf-rule-groups": pass                 # WAF rule groups configured
        "soc2-cc7.1-waf-logging": pass                     # WAF logging configured

  # ---- ACM extended: renewal status, transparency logging ----
  - name: soc2-aws-acm-extended
    description: "SOC2 ACM extended — renewal status, transparency logging"
    enabled: true
    credentials:
      - aws-positive
    framework: soc2
    collectors:
      - provider: aws
        services: [acm]
    policies:
      include:
        - "soc2-cc6.8-acm-renewal-status"
        - "soc2-cc7.1-acm-transparency-logging"
    assertions:
      expected_policy_results:
        "soc2-cc6.8-acm-renewal-status": skip              # no ACM certificates
        "soc2-cc7.1-acm-transparency-logging": skip

