framework: soc2
version: "1.0"
entries:
  - id: quarterly_access_review
    control: CC6.3
    type: document_upload
    frequency: quarterly
    temporal_rule: retrospective
    grace_period: "15d"
    name: Quarterly Access Review
    description: Upload evidence of quarterly user access review including reviewer sign-off
    severity: high
    accepted_formats: [pdf, xlsx, csv]
    category: access_control
    tsc: security

  - id: security_awareness_training
    control: CC1.4
    type: document_upload
    frequency: yearly
    temporal_rule: anytime
    grace_period: "30d"
    name: Security Awareness Training
    description: Upload evidence of annual security awareness training completion for all employees
    severity: high
    accepted_formats: [pdf, xlsx, csv]
    category: configuration_management
    tsc: security

  - id: incident_response_test
    control: CC7.4
    type: checklist
    frequency: yearly
    temporal_rule: retrospective
    grace_period: "30d"
    name: Incident Response Plan Test
    description: Complete checklist confirming annual incident response plan testing
    severity: high
    category: logging
    tsc: security
    items:
      - id: plan_tested
        text: Incident response plan was tested via tabletop exercise or simulation
        required: true
      - id: roles_verified
        text: All incident response roles and responsibilities were verified
        required: true
      - id: communication_tested
        text: Communication channels and escalation paths were tested
        required: true
      - id: lessons_documented
        text: Lessons learned were documented and plan updated accordingly
        required: false

  - id: risk_acceptance_signoff
    control: CC3.1
    type: declaration
    frequency: quarterly
    temporal_rule: retrospective
    grace_period: "15d"
    name: Risk Acceptance Sign-off
    description: Declare that quarterly risk assessment has been reviewed and accepted by management
    severity: high
    category: vulnerability_management
    tsc: security
    declaration_text: "I confirm that the quarterly risk assessment has been reviewed, all identified risks have been evaluated, and appropriate risk treatment decisions have been made and approved by management."

  - id: background_check
    control: CC1.4
    type: declaration
    frequency: yearly
    temporal_rule: retrospective
    grace_period: "30d"
    name: Background Check Summary
    description: Declare that background checks were completed for all new hires in this period, or that no new hires joined
    severity: high
    category: hr_governance
    tsc: security
    declaration_text: "I confirm that background checks have been completed for all new hires during this period, or that no new hires joined the organization during this period."

  - id: performance_review_security
    control: CC1.5
    type: document_upload
    frequency: yearly
    temporal_rule: retrospective
    grace_period: "30d"
    name: Performance Review (Security Adherence)
    description: Upload summary of annual performance reviews covering security policy adherence
    severity: medium
    accepted_formats: [pdf, xlsx, csv]
    category: hr_governance
    tsc: security
    optional: true

  - id: board_security_review
    control: CC1.2
    type: document_upload
    frequency: quarterly
    temporal_rule: retrospective
    grace_period: "15d"
    name: Board Security Review Minutes
    description: Upload minutes of quarterly board review of information security posture
    severity: high
    accepted_formats: [pdf, docx]
    category: hr_governance
    tsc: security

  - id: annual_risk_assessment
    control: CC3.2
    type: document_upload
    frequency: yearly
    temporal_rule: retrospective
    grace_period: "30d"
    name: Annual Risk Assessment Report
    description: Upload the annual enterprise risk assessment report
    severity: high
    accepted_formats: [pdf, xlsx, docx]
    category: risk_compliance
    tsc: security

  - id: significant_change_analysis
    control: CC3.4
    type: declaration
    frequency: quarterly
    temporal_rule: retrospective
    grace_period: "15d"
    name: Significant Change Impact Analysis
    description: Declare that significant changes affecting internal controls were analyzed this period, or that none occurred
    severity: high
    category: risk_compliance
    tsc: security
    declaration_text: "I confirm that any significant changes affecting the system of internal controls during this period have been analyzed and documented, or that no such significant changes occurred."

  - id: vendor_soc2_review
    control: CC9.2
    type: checklist
    frequency: yearly
    temporal_rule: retrospective
    grace_period: "30d"
    name: Vendor SOC 2 Report Review
    description: Complete checklist confirming annual review of critical vendor SOC 2 reports
    severity: high
    category: risk_compliance
    tsc: security
    items:
      - id: all_vendors_reviewed
        text: SOC 2 (or equivalent) reports for all critical vendors have been reviewed
        required: true
      - id: exceptions_documented
        text: Any exceptions or qualifications noted in vendor reports were documented
        required: true
      - id: cuecs_addressed
        text: Complementary User Entity Controls (CUECs) have been identified and addressed
        required: true
      - id: remediation_tracked
        text: Remediation items for vendor issues are being tracked
        required: false

  - id: cyber_liability_insurance
    control: CC9.1
    type: document_upload
    frequency: yearly
    temporal_rule: anytime
    grace_period: "30d"
    name: Cyber Liability Insurance Certificate
    description: Upload current cyber liability insurance certificate
    severity: medium
    accepted_formats: [pdf]
    category: risk_compliance
    tsc: security
    optional: true

  - id: privileged_access_log
    control: CC6.1
    type: document_upload
    frequency: quarterly
    temporal_rule: retrospective
    grace_period: "15d"
    name: Privileged Access Justification Log
    description: Upload quarterly log of privileged access grants with business justifications
    severity: high
    accepted_formats: [pdf, xlsx, csv]
    category: access_physical
    tsc: security

  - id: visitor_log
    control: CC6.4
    type: document_upload
    frequency: quarterly
    temporal_rule: retrospective
    grace_period: "15d"
    name: Physical Office Visitor Log
    description: Upload the quarterly physical office visitor log snapshot
    severity: medium
    accepted_formats: [pdf, xlsx, csv]
    category: access_physical
    tsc: security

  - id: office_walkthrough
    control: CC6.4
    type: checklist
    frequency: quarterly
    temporal_rule: retrospective
    grace_period: "15d"
    name: Office Security Walkthrough
    description: Complete quarterly office security walkthrough checklist
    severity: medium
    category: access_physical
    tsc: security
    items:
      - id: it_closet_locked
        text: IT/server closet was locked and access-restricted
        required: true
      - id: clean_desk
        text: Clean-desk policy was observed across the office
        required: true
      - id: cctv_functioning
        text: CCTV cameras were functioning and recording
        required: true
      - id: no_violations
        text: No physical security violations were observed
        required: true

  - id: incident_post_mortem
    control: CC7.4
    type: declaration
    frequency: quarterly
    temporal_rule: retrospective
    grace_period: "15d"
    name: Incident Post-Mortem Summary
    description: Declare that all security incidents this period have post-mortem documentation, or that none occurred
    severity: high
    category: system_ops_bcdr
    tsc: security
    declaration_text: "I confirm that all security incidents that occurred during this period have documented post-mortem summaries, or that no security incidents occurred during this period."

  - id: dr_test_report
    control: A1.3
    type: document_upload
    frequency: yearly
    temporal_rule: retrospective
    grace_period: "30d"
    name: Disaster Recovery Test Report
    description: Upload the annual disaster recovery test report
    severity: high
    accepted_formats: [pdf, docx]
    category: system_ops_bcdr
    tsc: availability

  - id: backup_restoration_log
    control: A1.2
    type: document_upload
    frequency: quarterly
    temporal_rule: retrospective
    grace_period: "15d"
    name: Backup Restoration Log
    description: Upload the quarterly backup restoration test log
    severity: high
    accepted_formats: [pdf, xlsx, csv]
    category: system_ops_bcdr
    tsc: availability

  - id: capacity_review
    control: A1.1
    type: document_upload
    frequency: quarterly
    temporal_rule: retrospective
    grace_period: "15d"
    name: Quarterly Capacity Review
    description: Upload the quarterly capacity review report
    severity: medium
    accepted_formats: [pdf, xlsx]
    category: system_ops_bcdr
    tsc: availability

  - id: data_classification_registry
    control: C1.1
    type: document_upload
    frequency: yearly
    temporal_rule: retrospective
    grace_period: "30d"
    name: Data Classification Registry
    description: Upload the annual data classification registry listing data assets and their confidentiality levels
    severity: high
    accepted_formats: [pdf, xlsx, csv]
    category: data_protection
    tsc: confidentiality

  - id: media_sanitization
    control: CC6.5
    type: declaration
    frequency: quarterly
    temporal_rule: retrospective
    grace_period: "15d"
    name: Media Sanitization Certificate
    description: Declare that all decommissioned media was sanitized or destroyed this period, with certificates attached for any such events
    severity: high
    category: data_protection
    tsc: security
    declaration_text: "I confirm that no media decommissioning events occurred this period, or that all such events that did occur have sanitization/destruction certificates attached."

  - id: employee_nda
    control: CC1.1
    type: declaration
    frequency: yearly
    temporal_rule: retrospective
    grace_period: "30d"
    name: Employee NDA Acknowledgment
    description: Declare that all employees have acknowledged the current NDA and code-of-conduct during this period
    severity: high
    category: hr_governance
    tsc: security
    declaration_text: "I confirm that all current employees have signed or re-acknowledged the organization's NDA and code-of-conduct during this period."

  - id: user_onboarding_log
    control: CC6.2
    type: document_upload
    frequency: quarterly
    temporal_rule: retrospective
    grace_period: "15d"
    name: User Onboarding Access Grants Log
    description: Upload the quarterly log of user onboarding access grants, including approver and role assignments
    severity: high
    accepted_formats: [pdf, xlsx, csv]
    category: hr_governance
    tsc: security

  - id: user_termination_log
    control: CC6.3
    type: document_upload
    frequency: quarterly
    temporal_rule: retrospective
    grace_period: "15d"
    name: User Termination Access Revocation Log
    description: Upload the quarterly log of user terminations showing timely revocation of access across systems
    severity: high
    accepted_formats: [pdf, xlsx, csv]
    category: hr_governance
    tsc: security

  - id: policy_review_log
    control: CC5.3
    type: document_upload
    frequency: yearly
    temporal_rule: retrospective
    grace_period: "30d"
    name: Annual Policy Review Log
    description: Upload the annual log documenting review (and any updates) of all information security policies
    severity: medium
    accepted_formats: [pdf, xlsx, docx]
    category: risk_compliance
    tsc: security

  - id: fraud_risk_assessment
    control: CC3.3
    type: document_upload
    frequency: yearly
    temporal_rule: retrospective
    grace_period: "30d"
    name: Fraud Risk Assessment
    description: Upload the annual fraud risk assessment identifying potential fraud scenarios and mitigating controls
    severity: medium
    accepted_formats: [pdf, docx]
    category: risk_compliance
    tsc: security

  - id: security_comm_channel
    control: CC2.2
    type: declaration
    frequency: quarterly
    temporal_rule: retrospective
    grace_period: "15d"
    name: Security Communication Channel Evidence
    description: Declare that a security communication channel is active and has been used this period to communicate security updates
    severity: medium
    category: risk_compliance
    tsc: security
    declaration_text: "I confirm that a dedicated security communication channel (Slack channel, mailing list, or intranet page) exists and has been used this period to communicate security updates and alerts to employees."

  - id: vendor_risk_directory
    control: CC9.2
    type: document_upload
    frequency: quarterly
    temporal_rule: retrospective
    grace_period: "15d"
    name: Vendor Risk Directory Snapshot
    description: Upload the quarterly vendor risk directory snapshot listing all active vendors with data classification and risk tier
    severity: high
    accepted_formats: [pdf, xlsx, csv]
    category: risk_compliance
    tsc: security

  - id: office_badge_access_review
    control: CC6.4
    type: document_upload
    frequency: quarterly
    temporal_rule: retrospective
    grace_period: "15d"
    name: Office Badge Access Review
    description: Upload the quarterly office badge access review listing active badge holders and access levels
    severity: high
    accepted_formats: [pdf, xlsx, csv]
    category: access_physical
    tsc: security

  - id: secure_hardware_storage_log
    control: CC6.5
    type: document_upload
    frequency: quarterly
    temporal_rule: retrospective
    grace_period: "15d"
    name: Secure Hardware Storage Log
    description: Upload the quarterly log of hardware assets stored in secure locations including check-in/check-out records
    severity: high
    accepted_formats: [pdf, xlsx, csv]
    category: access_physical
    tsc: security

  - id: asset_inventory_hardware
    control: CC6.1
    type: document_upload
    frequency: quarterly
    temporal_rule: retrospective
    grace_period: "15d"
    name: Hardware Asset Inventory
    description: Upload the quarterly hardware asset inventory listing all company-owned devices with assigned owners and locations
    severity: high
    accepted_formats: [pdf, xlsx, csv]
    category: access_physical
    tsc: security

  - id: change_approval_log
    control: CC8.1
    type: document_upload
    frequency: quarterly
    temporal_rule: retrospective
    grace_period: "15d"
    name: Change Approval Log
    description: Upload the quarterly change approval log showing all production changes with approver sign-off
    severity: high
    accepted_formats: [pdf, xlsx, csv]
    category: change_management
    tsc: security

  - id: emergency_change_procedure
    control: CC8.1
    type: declaration
    frequency: quarterly
    temporal_rule: retrospective
    grace_period: "15d"
    name: Emergency Change Procedure Declaration
    description: Declare that emergency change procedures are documented and were followed for any emergency changes this period
    severity: high
    category: change_management
    tsc: security
    declaration_text: "I confirm that documented emergency change procedures exist and were followed for all emergency changes this period, or that no emergency changes occurred."

  - id: vuln_remediation_tracker
    control: CC7.1
    type: document_upload
    frequency: quarterly
    temporal_rule: retrospective
    grace_period: "15d"
    name: Vulnerability Remediation Tracker
    description: Upload the quarterly vulnerability remediation tracker showing open/closed vulnerabilities and remediation timelines
    severity: high
    accepted_formats: [pdf, xlsx, csv]
    category: vulnerability_management
    tsc: security

  - id: hardening_standards_doc
    control: CC6.8
    type: document_upload
    frequency: yearly
    temporal_rule: retrospective
    grace_period: "30d"
    name: Hardening Standards Document
    description: Upload the current hardening standards document covering OS, database, and application baseline configurations
    severity: high
    accepted_formats: [pdf, docx]
    category: vulnerability_management
    tsc: security

  - id: vuln_scan_results
    control: CC7.1
    type: document_upload
    frequency: quarterly
    temporal_rule: retrospective
    grace_period: "15d"
    name: Vulnerability Scan Results
    description: Upload the quarterly vulnerability scan results from internal or external scanning tools
    severity: high
    accepted_formats: [pdf, xlsx, csv]
    category: vulnerability_management
    tsc: security

  - id: fim_configuration
    control: CC7.1
    type: document_upload
    frequency: yearly
    temporal_rule: retrospective
    grace_period: "30d"
    name: File Integrity Monitoring Configuration
    description: Upload the current file integrity monitoring (FIM) configuration showing monitored paths and alerting rules
    severity: high
    accepted_formats: [pdf, docx]
    category: vulnerability_management
    tsc: security
