schema_version: project.v1

# M6 walking-skeleton fixture. The vault path is overridden by the
# test harness at runtime; this file declares the framework, the
# fiscal period, the source bindings, and the manual-evidence catalog
# pointer that the orchestrator wires together.
framework: soc2

period:
  fiscal_calendar:
    type: calendar_quarter
  time_basis: commit

vault:
  backend: local
  path: ./vault-placeholder

sources:
  aws.iam:
    region: us-east-1
  aws.cloudtrail:
    region: us-east-1
  aws.cloudwatch:
    region: us-east-1
  aws.guardduty:
    region: us-east-1
  aws.config:
    region: us-east-1
  aws.s3:
    region: us-east-1
  aws.kms:
    region: us-east-1
  aws.rds:
    region: us-east-1
  aws.ec2:
    region: us-east-1
  aws.eks:
    region: us-east-1
  manual.pdf:
    backend: local
    path: ./manual-evidence-placeholder
    prefix: manual/
  gcp.iam:
    project_id: example-project
  gcp.storage:
    project_id: example-project
  gcp.compute:
    project_id: example-project
  gcp.sql:
    project_id: example-project

bindings:
  soc2.cc6.1.mfa_enforced:
    user_directory:
      - source: aws.iam
  soc2.cc6.3.access_review_quarterly:
    review_document:
      - source: "manual.pdf:access_review_quarterly"
  soc2.cc6.1.mfa_enforced_all_sources:
    user_directory:
      - source: aws.iam
  soc2.cc7.2.cloudtrail_multiregion_enabled:
    trails:
      - source: aws.cloudtrail
  soc2.cc7.2.cloudwatch_logs_retention_set:
    log_groups:
      - source: aws.cloudwatch
  soc2.cc7.1.guardduty_enabled:
    detectors:
      - source: aws.guardduty
  soc2.cc7.1.config_recorder_enabled:
    recorders:
      - source: aws.config
  soc2.cc6.7.s3_bucket_encrypted:
    buckets:
      - source: aws.s3
  soc2.cc6.7.kms_key_rotation_enabled:
    keys:
      - source: aws.kms
  soc2.cc6.7.rds_encryption_at_rest:
    db_instances:
      - source: aws.rds
  soc2.cc6.6.ec2_no_public_ip:
    instances:
      - source: aws.ec2
  soc2.cc6.7.eks_secrets_encryption:
    clusters:
      - source: aws.eks
  soc2.cc6.1.gcp_iam_no_owner_role_for_users:
    iam_bindings:
      - source: gcp.iam
  soc2.cc6.7.gcs_bucket_uniform_access:
    buckets:
      - source: gcp.storage
  soc2.cc6.6.compute_no_default_service_account:
    instances:
      - source: gcp.compute
  soc2.cc6.7.cloudsql_require_ssl:
    instances:
      - source: gcp.sql

cloud:
  base_url: ""
