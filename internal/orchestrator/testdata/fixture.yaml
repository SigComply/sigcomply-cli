schema_version: project.v1

# M6 walking-skeleton fixture. The vault path is overridden by the
# test harness at runtime; this file declares the framework, the
# fiscal period, the source bindings, and the manual-evidence catalog
# pointer that the orchestrator wires together.
framework: soc2

period:
  fiscal_calendar:
    type: calendar_quarter
  time_basis: commit

vault:
  backend: local
  path: ./vault-placeholder

sources:
  aws.iam:
    region: us-east-1
  aws.cloudtrail:
    region: us-east-1
  aws.cloudwatch:
    region: us-east-1
  aws.guardduty:
    region: us-east-1
  aws.config:
    region: us-east-1
  manual.pdf:
    backend: local
    path: ./manual-evidence-placeholder
    prefix: manual/

bindings:
  soc2.cc6.1.mfa_enforced:
    user_directory:
      - source: aws.iam
  soc2.cc6.3.access_review_quarterly:
    review_document:
      - source: "manual.pdf:access_review_quarterly"
  soc2.cc6.1.mfa_enforced_all_sources:
    user_directory:
      - source: aws.iam
  soc2.cc7.2.cloudtrail_multiregion_enabled:
    trails:
      - source: aws.cloudtrail
  soc2.cc7.2.cloudwatch_logs_retention_set:
    log_groups:
      - source: aws.cloudwatch
  soc2.cc7.1.guardduty_enabled:
    detectors:
      - source: aws.guardduty
  soc2.cc7.1.config_recorder_enabled:
    recorders:
      - source: aws.config

cloud:
  base_url: ""
