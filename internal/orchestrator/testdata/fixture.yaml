schema_version: project.v1

# M6 walking-skeleton fixture. The vault path is overridden by the
# test harness at runtime; this file declares the framework, the
# fiscal period, the source bindings, and the manual-evidence catalog
# pointer that the orchestrator wires together.
framework: soc2

period:
  fiscal_calendar:
    type: calendar_quarter
  time_basis: commit

vault:
  backend: local
  path: ./vault-placeholder

sources:
  aws.iam:
    region: us-east-1
  aws.cloudtrail:
    region: us-east-1
  aws.cloudwatch:
    region: us-east-1
  aws.guardduty:
    region: us-east-1
  aws.config:
    region: us-east-1
  aws.s3:
    region: us-east-1
  aws.kms:
    region: us-east-1
  aws.rds:
    region: us-east-1
  aws.ec2:
    region: us-east-1
  aws.eks:
    region: us-east-1
  github:
    org: acme
  okta:
    org_url: https://acme.okta.com
  manual.pdf:
    backend: local
    path: ./manual-evidence-placeholder
    prefix: manual/
  gcp.iam:
    project_id: example-project
  gcp.storage:
    project_id: example-project
  gcp.compute:
    project_id: example-project
  gcp.sql:
    project_id: example-project

policies:
  # Every automated policy uses the conventional "evidence" slot.
  # Source-agnostic MFA: bind every directory_user-emitting source.
  soc2.cc6.1.mfa_enforced_all_users:
    bindings:
      evidence:
        - source: aws.iam
        - source: okta
  # Admin-MFA is phrased to ERROR on a source that can't determine admin
  # status (Okta). Narrow it to aws.iam — the source that populates
  # is_admin — with an explicit binding, overriding auto-binding. This is
  # the canonical "several sources emit the type but only one can answer
  # this policy" override.
  soc2.cc6.1.mfa_enforced_admins:
    bindings:
      evidence:
        - source: aws.iam
  # Compliant resources → pass.
  soc2.cc7.1.audit_logging_enabled:
    bindings:
      evidence:
        - source: aws.cloudtrail
  soc2.cc7.1.log_retention_min_90d:
    bindings:
      evidence:
        - source: aws.cloudwatch
  # Non-compliant resources → fail.
  soc2.cc6.8.threat_detection_enabled:
    bindings:
      evidence:
        - source: aws.guardduty
  soc2.cc7.1.config_recording_enabled:
    bindings:
      evidence:
        - source: aws.config

cloud:
  base_url: ""
