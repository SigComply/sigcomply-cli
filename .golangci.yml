# golangci-lint configuration v2
# https://golangci-lint.run/usage/configuration/

version: "2"

run:
  timeout: 5m
  tests: true

output:
  formats:
    text:
      path: stdout

linters:
  enable:
    # Default linters
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

    # Additional linters for code quality
    - bodyclose        # Check HTTP response body is closed
    - dogsled          # Check for too many blank identifiers
    - dupl             # Check for duplicate code
    - gochecknoinits   # Check for init functions
    - goconst          # Check for repeated strings
    - gocritic         # Comprehensive Go linter
    - gocyclo          # Check cyclomatic complexity
    - goprintffuncname # Check printf-like function names
    - gosec            # Security checks
    - misspell         # Check spelling
    - nakedret         # Check for naked returns
    - nilerr           # Check for nil error returns
    - noctx            # Check for context usage
    - prealloc         # Check for slice preallocation
    - predeclared      # Check for shadowed predeclared identifiers
    - revive           # Replacement for golint
    - rowserrcheck     # Check sql.Rows error handling
    - sqlclosecheck    # Check sql.Rows/Stmt are closed
    - tparallel        # Check for missing t.Parallel()
    - unconvert        # Check for unnecessary conversions
    - unparam          # Check for unused parameters
    - whitespace       # Check for whitespace issues

  settings:
    errcheck:
      check-type-assertions: true
      check-blank: true

    govet:
      enable-all: true
      disable:
        - fieldalignment  # Field ordering is for readability
        - shadow          # Intentional shadowing in loops is acceptable

    gocyclo:
      min-complexity: 15

    dupl:
      threshold: 200

    goconst:
      min-len: 3
      min-occurrences: 3

    misspell:
      locale: US

    revive:
      rules:
        - name: blank-imports
        - name: context-as-argument
        - name: context-keys-type
        - name: dot-imports
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: exported
        - name: increment-decrement
        - name: indent-error-flow
        - name: package-comments
        - name: range
        - name: receiver-naming
        - name: time-naming
        - name: unexported-return
        - name: var-declaration
        - name: var-naming

    gosec:
      severity: medium
      confidence: medium
      excludes:
        - G104  # Audit errors not checked - too noisy
        - G304  # File inclusion - false positives with config files

    gocritic:
      enabled-tags:
        - diagnostic
        - style
        - performance
      disabled-checks:
        - ifElseChain  # Sometimes clearer than switch
        - octalLiteral # Not common in Go

  exclusions:
    rules:
      # Source-plugin factories register themselves into the
      # process-global sources registry via init() — that's the
      # entire point of the self-registering factory pattern. See
      # internal/sources/factory.go and
      # docs/architecture/04-source-plugins.md §The factory contract.
      - path: internal/sources/.*factory\.go
        linters:
          - gochecknoinits
      # internal/sources/builtin imports every in-tree plugin as a
      # blank import for the side effect of running each package's
      # init(). The package-level doc comment justifies this; the
      # rule wants a per-line justification we won't repeat for
      # every plugin.
      - path: internal/sources/builtin/builtin\.go
        linters:
          - revive
      # Vault backend factories self-register into the vault
      # backend registry via init() — same pattern as source plugins.
      # See internal/vault/registry.go and
      # docs/architecture/00-three-plugin-axes.md §Axis B.
      - path: internal/vault/.*/register\.go
        linters:
          - gochecknoinits
      # internal/vault/builtin imports every in-tree vault backend as
      # a blank import for the side effect of running each package's
      # init(). The package-level doc comment justifies this.
      - path: internal/vault/builtin/builtin\.go
        linters:
          - revive
      # Manual.pdf reader backends self-register into the manual
      # reader registry via init() — same pattern as Axis B vault
      # backends. See internal/sources/manual/factory.go and
      # docs/architecture/00-three-plugin-axes.md §Axis A.
      - path: internal/sources/manual/.*/register\.go
        linters:
          - gochecknoinits
      # internal/sources/manual/builtin imports every in-tree manual
      # reader backend as a blank import for the side effect of
      # running each package's init(). The package-level doc comment
      # justifies this.
      - path: internal/sources/manual/builtin/builtin\.go
        linters:
          - revive
      # Tests for the manual reader register.go factories call
      # build() — which returns the 5-tuple (reader, scheme, bucket,
      # prefix, err) defined by manual.ReaderFactory. Negative-path
      # tests legitimately only care about err, so `_, _, _, _, err :=`
      # is the idiomatic shape. dogsled flags this pattern; suppress
      # it for the manual reader test files.
      - path: internal/sources/manual/.*/.*_test\.go
        linters:
          - dogsled

issues:
  max-issues-per-linter: 50
  max-same-issues: 10
  new: false
  fix: false

severity:
  default: warning
