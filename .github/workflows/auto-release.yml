# Auto-release workflow for SigComply CLI
# Bumps version, creates a tag, and runs GoReleaser on every push to main.
# Uses conventional commit prefixes to determine version bump:
#   feat: -> minor bump
#   fix:, refactor:, perf:, etc. -> patch bump
#   BREAKING CHANGE in body -> major bump
#
# Build provenance attestations are generated for all release artifacts.
# Customers can verify with: gh attestation verify <binary> --repo SigComply/sigcomply-cli

name: Auto Release

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'

permissions:
  contents: read

jobs:
  auto-release:
    name: Version Bump and Build
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip release]') && !contains(github.event.head_commit.message, 'chore(release)')"
    permissions:
      contents: write
    outputs:
      new_tag: ${{ steps.bump.outputs.new_tag }}
      latest_tag: ${{ steps.bump.outputs.latest_tag }}
      bump: ${{ steps.bump.outputs.bump }}
      created: ${{ steps.tag.outputs.created }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Determine version bump
        id: bump
        run: |
          # Get the latest tag, default to v0.0.0 if none exists
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          echo "latest_tag=${LATEST_TAG}" >> "$GITHUB_OUTPUT"

          # Parse current version
          VERSION="${LATEST_TAG#v}"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$VERSION"

          # Analyze commits since last tag to determine bump type
          COMMITS=$(git log "${LATEST_TAG}..HEAD" --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s")

          BUMP="patch"
          if echo "$COMMITS" | grep -qiE "BREAKING CHANGE|^[a-z]+(\(.*\))?!:"; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qE "^feat(\(.*\))?:"; then
            BUMP="minor"
          fi

          # Calculate new version
          case $BUMP in
            major)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              ;;
            minor)
              MINOR=$((MINOR + 1))
              PATCH=0
              ;;
            patch)
              PATCH=$((PATCH + 1))
              ;;
          esac

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "new_tag=${NEW_TAG}" >> "$GITHUB_OUTPUT"
          echo "bump=${BUMP}" >> "$GITHUB_OUTPUT"
          echo "Version bump: ${BUMP} (${LATEST_TAG} -> ${NEW_TAG})"

      - name: Create and push tag
        id: tag
        run: |
          NEW_TAG="${{ steps.bump.outputs.new_tag }}"

          # Check if tag already exists
          if git rev-parse "$NEW_TAG" >/dev/null 2>&1; then
            echo "Tag $NEW_TAG already exists, skipping release"
            echo "created=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$NEW_TAG" -m "Release $NEW_TAG"
          git push origin "$NEW_TAG"
          echo "created=true" >> "$GITHUB_OUTPUT"
          echo "Created and pushed tag: $NEW_TAG"

      - name: Set up Go
        if: steps.tag.outputs.created == 'true'
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser (build only, skip publish)
        if: steps.tag.outputs.created == 'true'
        uses: goreleaser/goreleaser-action@e435ccd777264be153ace6237001ef4d979d3a7a # v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean --skip=publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_CURRENT_TAG: ${{ steps.bump.outputs.new_tag }}

      - name: Upload build artifacts
        if: steps.tag.outputs.created == 'true'
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6
        with:
          name: artifacts
          path: dist/
          if-no-files-found: error
          retention-days: 1

  attest:
    name: Attest Artifacts
    needs: auto-release
    if: needs.auto-release.outputs.created == 'true'
    runs-on: ubuntu-latest
    permissions:
      id-token: write      # required to sign attestations with OIDC
      attestations: write  # required to store attestations
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: artifacts
          path: dist/

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/*.tar.gz
            dist/*.zip

  publish:
    name: Publish Release
    needs: [auto-release, attest]
    if: needs.auto-release.outputs.created == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: artifacts
          path: dist/

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.auto-release.outputs.new_tag }}
        run: |
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "SigComply CLI $TAG" \
            --generate-notes \
            dist/*

  summary:
    name: Release Summary
    needs: [auto-release, attest, publish]
    if: always()
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Write summary
        run: |
          echo "## Auto Release" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| Previous | ${{ needs.auto-release.outputs.latest_tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| New | ${{ needs.auto-release.outputs.new_tag }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Bump | ${{ needs.auto-release.outputs.bump }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Tag Created | ${{ needs.auto-release.outputs.created }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Attestation | ${{ needs.attest.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Published | ${{ needs.publish.result }} |" >> $GITHUB_STEP_SUMMARY
