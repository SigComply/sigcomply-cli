# Release workflow for SigComply CLI
# Triggered automatically by tag pushes (from auto-release) or manually via workflow_dispatch.

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v0.2.0). Leave empty to use latest tag.'
        required: false
        type: string

permissions:
  contents: write
  packages: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: make test

      - name: Run linter
        uses: golangci/golangci-lint-action@v7
        with:
          version: latest
          args: --timeout=5m

  resolve-version:
    name: Resolve Version
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve version tag
        id: resolve
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            TAG="${{ inputs.version }}"
          else
            # Get latest tag, or default to v0.1.0
            TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.1.0")
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${TAG}"

  tag-and-release:
    name: Create Tag
    needs: [test, resolve-version]
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create and push tag
        run: |
          TAG="${{ needs.resolve-version.outputs.tag }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists, skipping tag creation"
          else
            git tag "$TAG"
            git push origin "$TAG"
            echo "Created and pushed tag: $TAG"
          fi

  release:
    name: Release
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}

  verify:
    name: Verify Installation
    needs: release
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install via script
        run: |
          SIGCOMPLY_VERSION="${GITHUB_REF_NAME}" ./scripts/install.sh

      - name: Verify version
        run: |
          sigcomply version
          VERSION_OUTPUT=$(sigcomply version)
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if echo "$VERSION_OUTPUT" | grep -q "$TAG_VERSION"; then
            echo "Version matches: $TAG_VERSION"
          else
            echo "Version mismatch!"
            echo "Expected: $TAG_VERSION"
            echo "Got: $VERSION_OUTPUT"
            exit 1
          fi

      - name: Verify check command
        run: |
          sigcomply check --help

  notify:
    name: Notify
    needs: [release, verify]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Create release summary
        run: |
          echo "## Release Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version**: ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.release.result }}" = "success" ] && [ "${{ needs.verify.result }}" = "success" ]; then
            echo "**Status**: Release successful!" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Installation" >> $GITHUB_STEP_SUMMARY
            echo '```bash' >> $GITHUB_STEP_SUMMARY
            echo 'curl -fsSL https://raw.githubusercontent.com/SigComply/sigcomply-cli/main/scripts/install.sh | sh' >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "**Status**: Release failed or verification failed" >> $GITHUB_STEP_SUMMARY
          fi
