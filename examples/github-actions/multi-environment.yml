# Example: Multi-Environment Compliance Checks (standalone workflow)
#
# Runs `sigcomply check` across multiple AWS accounts/regions using a
# matrix. SigComply ships no reusable workflow — each matrix leg installs
# the released binary via curl and runs the CLI directly. One repo = one
# framework; the framework is read from `framework:` in .sigcomply.yaml.
#
# Copy to .github/workflows/compliance-multi-env.yml and set the per-env
# role ARNs as repo secrets (AWS_ROLE_ARN_PROD, …).

name: Multi-Environment Compliance

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 2 * * 1'  # Weekly on Monday at 02:00 UTC

permissions:
  id-token: write
  contents: read

env:
  SIGCOMPLY_VERSION: v0.64.38    # pinned release; bump to a newer tag, or set to "latest" for the newest

jobs:
  compliance:
    name: Check ${{ matrix.environment }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false  # Continue checking other environments if one fails
      matrix:
        include:
          - environment: production
            aws-region: us-east-1
            role-secret: AWS_ROLE_ARN_PROD
          - environment: staging
            aws-region: us-east-1
            role-secret: AWS_ROLE_ARN_STAGING
          - environment: development
            aws-region: us-west-2
            role-secret: AWS_ROLE_ARN_DEV
    steps:
      - uses: actions/checkout@v4
      - name: Install SigComply CLI
        run: |
          set -eu
          version="${SIGCOMPLY_VERSION:-latest}"
          if [ "$version" = "latest" ]; then
            tag=$(curl -fsSL https://api.github.com/repos/SigComply/sigcomply-cli/releases/latest | jq -r .tag_name)
          else
            tag="$version"
          fi
          ver="${tag#v}"
          curl -fsSL "https://github.com/SigComply/sigcomply-cli/releases/download/${tag}/sigcomply_${ver}_linux_amd64.tar.gz" -o /tmp/sigcomply.tar.gz
          tar -xzf /tmp/sigcomply.tar.gz -C /usr/local/bin sigcomply
          chmod +x /usr/local/bin/sigcomply
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets[matrix.role-secret] }}
          aws-region: ${{ matrix.aws-region }}
          audience: https://api.sigcomply.com
      - name: Run SigComply
        run: sigcomply check

  summary:
    name: Compliance Summary
    needs: compliance
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Generate summary
        run: |
          echo "## Multi-Environment Compliance Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Compliance checks completed for all environments." >> $GITHUB_STEP_SUMMARY
          echo "Check individual job results for details." >> $GITHUB_STEP_SUMMARY
