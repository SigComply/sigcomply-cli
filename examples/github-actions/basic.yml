# Example: Basic SigComply Compliance Check (standalone workflow)
#
# SigComply ships NO reusable `workflow_call` workflow and no composite
# action — integration is a standalone job that installs the released
# binary via curl and runs `sigcomply check`. This mirrors what
# `sigcomply init-ci` scaffolds; copy it to
# .github/workflows/compliance.yml and edit the env block.

name: Compliance Check

on:
  push:
    branches: [main]
  pull_request:
  # Optional: also run on a schedule (daily at 02:00 UTC).
  schedule:
    - cron: '0 2 * * *'

permissions:
  id-token: write    # OIDC role assumption + SigComply Cloud submission
  contents: read

env:
  SIGCOMPLY_VERSION: v0.64.38    # pinned release; bump to a newer tag, or set to "latest" for the newest
  AWS_REGION: us-east-1
  AWS_ROLE_ARN: arn:aws:iam::000000000000:role/REPLACE_ME

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - name: Install SigComply CLI
        run: |
          set -eu
          version="${SIGCOMPLY_VERSION:-latest}"
          if [ "$version" = "latest" ]; then
            tag=$(curl -fsSL https://api.github.com/repos/SigComply/sigcomply-cli/releases/latest | jq -r .tag_name)
          else
            tag="$version"
          fi
          ver="${tag#v}"
          curl -fsSL "https://github.com/SigComply/sigcomply-cli/releases/download/${tag}/sigcomply_${ver}_linux_amd64.tar.gz" -o /tmp/sigcomply.tar.gz
          tar -xzf /tmp/sigcomply.tar.gz -C /usr/local/bin sigcomply
          chmod +x /usr/local/bin/sigcomply
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
          audience: https://api.sigcomply.com
      - name: Run SigComply
        # Framework comes from `framework:` in .sigcomply.yaml (there is no
        # --framework flag on `check`). Exit code: 0 pass, 1 violations,
        # 2 execution error, 3 config error. To fail the job on violations,
        # set `ci.fail_on_violation: true` in .sigcomply.yaml.
        run: sigcomply check
