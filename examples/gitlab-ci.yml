# SigComply CLI - GitLab CI Example
#
# A minimal, working GitLab CI pipeline for SigComply compliance checks.
# This mirrors what `sigcomply init-ci --ci gitlab` scaffolds; the
# recommended path is to run that command rather than copy this by hand.
#
# How it works:
#   - On every push to the default branch and every merge request, the
#     `compliance:on_push` job runs `sigcomply check --on-push`.
#   - Cadence jobs (daily/weekly/monthly/quarterly/annual) are driven by
#     GitLab pipeline schedules: create one schedule per cadence under
#     Settings → CI/CD → Pipeline schedules and set the `CADENCE`
#     variable to the matching value.
#
# The framework is read from `framework:` in `.sigcomply.yaml` — there is
# no `--framework` flag on `check`. Exit codes: 0 pass, 1 violations,
# 2 execution error, 3 config error.
#
# OIDC: the `id_tokens` block mints a JWT scoped to
# `https://api.sigcomply.com`; the CLI uses it for SigComply Cloud
# submission and AWS role assumption. Replace the placeholders below.

variables:
  SIGCOMPLY_VERSION: "latest"   # pin to a tagged release (e.g. v1.2.3) once stabilised
  AWS_REGION: "us-east-1"
  AWS_ROLE_ARN: "arn:aws:iam::000000000000:role/REPLACE_ME"

.sigcomply_base:
  image: ubuntu:24.04
  id_tokens:
    SIGCOMPLY_OIDC_TOKEN:
      aud: https://api.sigcomply.com
  before_script:
    - apt-get update -qq && apt-get install -y -qq curl jq ca-certificates tar
    - |
      version="${SIGCOMPLY_VERSION:-latest}"
      if [ "$version" = "latest" ]; then
        tag=$(curl -fsSL https://api.github.com/repos/SigComply/sigcomply-cli/releases/latest | jq -r .tag_name)
      else
        tag="$version"
      fi
      ver="${tag#v}"
      curl -fsSL "https://github.com/SigComply/sigcomply-cli/releases/download/${tag}/sigcomply_${ver}_linux_amd64.tar.gz" -o /tmp/sigcomply.tar.gz
      tar -xzf /tmp/sigcomply.tar.gz -C /usr/local/bin sigcomply
      chmod +x /usr/local/bin/sigcomply

compliance:on_push:
  extends: .sigcomply_base
  stage: test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_PIPELINE_SOURCE == "push" && $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  script:
    - sigcomply check --on-push

compliance:daily:
  extends: .sigcomply_base
  stage: test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $CADENCE == "daily"'
  script:
    - sigcomply check --cadence daily

compliance:weekly:
  extends: .sigcomply_base
  stage: test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $CADENCE == "weekly"'
  script:
    - sigcomply check --cadence weekly

compliance:monthly:
  extends: .sigcomply_base
  stage: test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $CADENCE == "monthly"'
  script:
    - sigcomply check --cadence monthly

compliance:quarterly:
  extends: .sigcomply_base
  stage: test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $CADENCE == "quarterly"'
  script:
    - sigcomply check --cadence quarterly

compliance:annual:
  extends: .sigcomply_base
  stage: test
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule" && $CADENCE == "annual"'
  script:
    - sigcomply check --cadence annual
