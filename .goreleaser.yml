# GoReleaser configuration for SigComply CLI
# https://goreleaser.com

version: 2

project_name: sigcomply

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - id: sigcomply
    main: .
    binary: sigcomply
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
      - arm
    goarm:
      - "6"
      - "7"
    ignore:
      - goos: windows
        goarch: arm
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.buildTime={{.Date}}
    mod_timestamp: '{{ .CommitTimestamp }}'

archives:
  - id: default
    format: tar.gz
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        format: zip
    files:
      - LICENSE*
      - README*
      - CHANGELOG*

checksum:
  name_template: 'checksums.txt'
  algorithm: sha256

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  use: github
  filters:
    exclude:
      - '^docs:'
      - '^test:'
      - '^chore:'
      - '^ci:'
      - Merge pull request
      - Merge branch
  groups:
    - title: Features
      regexp: '^feat'
      order: 0
    - title: Bug Fixes
      regexp: '^fix'
      order: 1
    - title: Performance
      regexp: '^perf'
      order: 2
    - title: Refactoring
      regexp: '^refactor'
      order: 3
    - title: Other
      order: 999

release:
  github:
    owner: sigcomply
    name: sigcomply-cli
  draft: false
  prerelease: auto
  mode: replace
  header: |
    ## SigComply CLI {{ .Version }}

    Compliance automation without third-party access to your infrastructure.

    ### Installation

    **Quick Install (macOS/Linux):**
    ```bash
    curl -fsSL https://raw.githubusercontent.com/sigcomply/sigcomply-cli/main/scripts/install.sh | sh
    ```

    **Manual Download:**
    Download the appropriate binary for your platform from the assets below.

  footer: |
    ---
    **Full Changelog**: https://github.com/SigComply/sigcomply-cli/compare/{{ .PreviousTag }}...{{ .Tag }}

    For documentation, visit: https://github.com/SigComply/sigcomply-cli

sboms:
  - artifacts: archive
