# AcmeCorp — SOC 2 Type II project configuration.
#
# Profile:
#   - Mid-sized SaaS, ~80 employees, single AWS account (prod) in us-east-1
#   - Identity: Okta SSO; Code: GitHub Enterprise Cloud (org "acme")
#   - Some manual evidence: quarterly access review, annual security training
#   - One project-local custom policy + one custom source plugin
#   - Vault: S3 in us-east-1; CI: GitHub Actions; calendar quarters
#
# Demonstrates the consolidated config shape: all per-policy settings live
# under policies:<id>; control-level decisions live under controls:.

schema_version: project.v1

framework: soc2

period:
  fiscal_calendar:
    type: calendar_quarter
  time_basis: commit

vault:
  backend: s3
  bucket: acme-evidence
  region: us-east-1
  prefix: sigcomply/

sources:
  aws.iam:        { region: us-east-1 }
  aws.s3:         { region: us-east-1 }
  aws.cloudtrail: { region: us-east-1 }
  aws.kms:        { region: us-east-1 }
  aws.rds:        { region: us-east-1 }
  aws.ec2:        { region: us-east-1 }
  aws.cloudwatch: { region: us-east-1 }
  aws.guardduty:  { region: us-east-1 }
  aws.config:     { region: us-east-1 }
  aws.eks:        { region: us-east-1 }
  okta:
    org_url: https://acme.okta.com   # api_token here or OKTA_API_TOKEN env
  github:
    org: acme
  manual.pdf:
    backend: s3
    bucket:  acme-evidence
    region:  us-east-1
    prefix:  manual/
  acme.internal_iam:
    endpoint: "https://auth.acme-internal.com/api/v1"
    token_env: "ACME_IAM_TOKEN"

# ---------------------------------------------------------------------
# Per-policy configuration — bindings, parameters, cadence, evidence_mode,
# and scoped exceptions, all co-located under each policy ID.
# ---------------------------------------------------------------------
policies:
  # MFA — checked across both Okta and the custom internal IAM; stricter
  # than default (service accounts not exempt); caught hourly. One legacy
  # bot is waived (scoped) until it is decommissioned. SOC 2 ships MFA as
  # two policies (admins and all users); AcmeCorp overrides both.
  soc2.cc6.1.mfa_enforced_admins:
    cadence: hourly
    bindings:
      user_directory: [okta, acme.internal_iam]
    parameters:
      exempt_service_accounts: false
    exceptions:
      - scope:
          resource_id: "okta_user:legacy.deploy.bot@acme.com"
        state: waived
        reason: |
          Legacy deployment bot identity. To be retired with the
          decommissioning of the on-prem build pipeline. Replacement uses
          federated OIDC and does not require an interactive identity.
        approved_by: "jane.doe@acme.com"
        approved_at: "2026-01-15"
        expires_at: "2026-09-30"
  soc2.cc6.1.mfa_enforced_all_users:
    cadence: hourly
    bindings:
      user_directory: [okta, acme.internal_iam]
    parameters:
      exempt_service_accounts: false
    exceptions:
      - scope:
          resource_id: "okta_user:legacy.deploy.bot@acme.com"
        state: waived
        reason: |
          Legacy deployment bot identity. To be retired with the
          decommissioning of the on-prem build pipeline. Replacement uses
          federated OIDC and does not require an interactive identity.
        approved_by: "jane.doe@acme.com"
        approved_at: "2026-01-15"
        expires_at: "2026-09-30"

  # Access key rotation — only AWS programmatic users; stricter (60d).
  soc2.cc6.1.access_keys_rotated_90d:
    bindings:
      access_keys: [aws.iam]
    parameters:
      max_age_days: 60

  # Unused active keys — AWS programmatic users; tighter threshold (60d).
  soc2.cc6.1.no_unused_active_keys_90d:
    bindings:
      access_keys: [aws.iam]
    parameters:
      inactive_days: 60

  # Quarterly access review — manual PDF, structured catalog_entry
  # (replaces the old "manual.pdf:access_review_quarterly" string).
  soc2.cc6.3.access_review_quarterly:
    evidence_mode: manual
    catalog_entry: access_review_quarterly
    cadence: monthly

  # Annual security awareness training certificate — manual PDF.
  soc2.cc1.1.security_awareness_training:
    evidence_mode: manual
    catalog_entry: security_awareness_training
    cadence: annual

  # Custom project-local policy — contractor access review (manual PDF).
  acme.custom.cc6.1.contractor_review:
    evidence_mode: manual
    catalog_entry: contractor_review_quarterly
    parameters:
      max_contractors: 50

cloud:
  enabled: true

output:
  format: text
  json_path: ./compliance-report.json

ci:
  fail_on_violation: true
  fail_severity: high
